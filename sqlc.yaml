version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/queries/"
    schema: "internal/db/migrations/"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        emit_enum_valid_method: true
        emit_all_enum_values: true
        overrides:
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: false
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "boolean"
            nullable: true
            go_type: "bool"
          - db_type: "boolean"
            nullable: false
            go_type: "bool"
          - db_type: "bool"
            nullable: true
            go_type: "bool"
          - db_type: "bool"
            nullable: false
            go_type: "bool"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
          - db_type: "timestamptz"
            nullable: false
            go_type:
              import: "time"
              type: "Time"
          # Genuinely-nullable timestamptz columns must be *time.Time so pgx can
          # scan SQL NULL. The other timestamptz columns have DEFAULT NOW() and
          # are never NULL in practice, so they stay time.Time (above).
          - column: "merchants.verification_token_expires_at"
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - column: "merchants.reset_password_expires_at"
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - column: "transactions.confirmed_at"
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          # Nullable UUID FK — must be *uuid.UUID so merchant-only audit events
          # store NULL instead of the zero UUID (which violates the FK to transactions).
          - column: "audit_logs.transaction_id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          # payment_link_id: nullable UUID FK -> *uuid.UUID so normal (non-link)
          # transactions store NULL instead of the zero UUID.
          - column: "transactions.payment_link_id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          # payment_links.expires_at is genuinely nullable -> *time.Time.
          - column: "payment_links.expires_at"
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          # Force enum columns to plain strings; pgx decodes the enum from its
          # text form. (Scanning a custom enum OID into interface{} fails.)
          - column: "payment_links.currency"
            go_type: "string"
          - column: "transactions.currency"
            go_type: "string"
          - column: "transactions.operator"
            go_type: "string"
          - column: "transactions.status"
            go_type: "string"
          # Nullable TEXT — must be *string so pgx can scan NULL.
          - column: "transactions.sms_raw"
            go_type:
              type: "string"
              pointer: true
          # Ledger + settlements: nullable FK -> pointer, enum -> string,
          # genuinely-nullable timestamp -> pointer.
          - column: "ledger_entries.transaction_id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - column: "ledger_entries.currency"
            go_type: "string"
          - column: "settlements.currency"
            go_type: "string"
          - column: "settlements.status"
            go_type: "string"
          - column: "settlements.completed_at"
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - db_type: "text"
            nullable: true
            go_type: "string"
          - db_type: "text"
            nullable: false
            go_type: "string"
          - db_type: "varchar"
            nullable: true
            go_type: "string"
          - db_type: "varchar"
            nullable: false
            go_type: "string"
          - db_type: "transaction_status"
            go_type: "string"
          - db_type: "currency_type"
            go_type: "string"
          - db_type: "operator_type"
            go_type: "string"
          - db_type: "settlement_status"
            go_type: "string"
          - db_type: "bigint"
            go_type: "int64"
