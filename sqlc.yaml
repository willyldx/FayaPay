version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/queries/"
    schema: "internal/db/migrations/"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        emit_enum_valid_method: true
        emit_all_enum_values: true
        overrides:
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: false
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "boolean"
            nullable: true
            go_type: "bool"
          - db_type: "boolean"
            nullable: false
            go_type: "bool"
          - db_type: "bool"
            nullable: true
            go_type: "bool"
          - db_type: "bool"
            nullable: false
            go_type: "bool"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
          - db_type: "timestamptz"
            nullable: false
            go_type:
              import: "time"
              type: "Time"
          # Genuinely-nullable timestamptz columns must be *time.Time so pgx can
          # scan SQL NULL. The other timestamptz columns have DEFAULT NOW() and
          # are never NULL in practice, so they stay time.Time (above).
          - column: "merchants.verification_token_expires_at"
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - column: "merchants.reset_password_expires_at"
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - column: "transactions.confirmed_at"
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - db_type: "text"
            nullable: true
            go_type: "string"
          - db_type: "text"
            nullable: false
            go_type: "string"
          - db_type: "varchar"
            nullable: true
            go_type: "string"
          - db_type: "varchar"
            nullable: false
            go_type: "string"
          - db_type: "transaction_status"
            go_type: "string"
          - db_type: "currency_type"
            go_type: "string"
          - db_type: "operator_type"
            go_type: "string"
          - db_type: "bigint"
            go_type: "int64"
