name: Docs CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'kadryza-docs/**'
      - 'deploy/deploy-frontend.sh'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'kadryza-docs/**'
      - 'deploy/deploy-frontend.sh'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Serialize docs deploys (queue, never cancel an in-flight build). The on-VPS
# flock additionally serializes against manual deploys.
concurrency:
  group: deploy-docs
  cancel-in-progress: false

defaults:
  run:
    working-directory: kadryza-docs

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_DASHBOARD_URL: https://dashboard.kadryza.app
          NEXT_PUBLIC_API_URL: https://api.kadryza.app

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Sync source to VPS staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "kadryza-docs/pages/,kadryza-docs/components/,kadryza-docs/styles/,kadryza-docs/public/,kadryza-docs/package.json,kadryza-docs/theme.config.tsx,kadryza-docs/next.config.mjs,kadryza-docs/tsconfig.json,kadryza-docs/tailwind.config.js,kadryza-docs/postcss.config.js"
          target: "/tmp/kadryza-docs-deploy"
          strip_components: 1
          overwrite: true

      - name: Install deploy script on VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/deploy-frontend.sh"
          target: "/opt/kadryza/bin"
          strip_components: 1
          overwrite: true

      - name: Atomic release deploy (build off-path, swap symlink)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            chmod +x /opt/kadryza/bin/deploy-frontend.sh
            /opt/kadryza/bin/deploy-frontend.sh kadryza-docs /tmp/kadryza-docs-deploy kadryza-docs 3001
