name: Docs CI

on:
  push:
    branches: [main]
    paths:
      - 'kadryza-docs/**'
  pull_request:
    branches: [main]
    paths:
      - 'kadryza-docs/**'

defaults:
  run:
    working-directory: kadryza-docs

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kadryza-docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_DASHBOARD_URL: https://dashboard.kadryza.app
          NEXT_PUBLIC_API_URL: https://api.kadryza.app
