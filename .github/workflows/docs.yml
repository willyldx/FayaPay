name: Docs CI

on:
  push:
    branches: [main]
    paths:
      - 'kadryza-docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'kadryza-docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: kadryza-docs

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_DASHBOARD_URL: https://dashboard.kadryza.app
          NEXT_PUBLIC_API_URL: https://api.kadryza.app
