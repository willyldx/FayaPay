name: Dashboard CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'kadryza-dashboard/**'
      - 'deploy/deploy-frontend.sh'
      - '.github/workflows/dashboard.yml'
  pull_request:
    branches: [main]
    paths:
      - 'kadryza-dashboard/**'
      - 'deploy/deploy-frontend.sh'
      - '.github/workflows/dashboard.yml'
  workflow_dispatch:

# Serialize deploys: never let two dashboard runs deploy at once. We queue
# (cancel-in-progress: false) rather than cancel, so an in-flight deploy is
# never interrupted mid-build. The on-VPS flock additionally serializes
# against manual deploys.
concurrency:
  group: deploy-dashboard
  cancel-in-progress: false

defaults:
  run:
    working-directory: kadryza-dashboard

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Configurable via repo variables; the production value lives in the
          # VPS .env.local and is used by the deploy job's on-server build.
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://api.kadryza.app' }}
          NEXT_PUBLIC_APP_NAME: ${{ vars.NEXT_PUBLIC_APP_NAME || 'Kadryza' }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Sync source to VPS staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "kadryza-dashboard/app/,kadryza-dashboard/components/,kadryza-dashboard/lib/,kadryza-dashboard/hooks/,kadryza-dashboard/public/,kadryza-dashboard/styles/,kadryza-dashboard/package.json,kadryza-dashboard/next.config.mjs,kadryza-dashboard/tsconfig.json,kadryza-dashboard/tailwind.config.ts,kadryza-dashboard/postcss.config.mjs,kadryza-dashboard/components.json"
          target: "/tmp/kadryza-dash-deploy"
          strip_components: 1
          overwrite: true

      - name: Install deploy script on VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/deploy-frontend.sh"
          target: "/opt/kadryza/bin"
          strip_components: 1
          overwrite: true

      - name: Atomic release deploy (build off-path, swap symlink)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            chmod +x /opt/kadryza/bin/deploy-frontend.sh
            /opt/kadryza/bin/deploy-frontend.sh kadryza-dashboard /tmp/kadryza-dash-deploy kadryza-dashboard 3000
